# site information
site_name: "cinéphile: top movies / films"
site_url: https://hantang.github.io/cinephile
site_description: top movie collections
copyright: Copyright &copy; 2023 Hantang
# docs_dir: docs/

# Repository
repo_url: https://github.com/hantang/cinephile
# edit_uri: tree/main

theme:
  name: material
  # language: "zh"
  icon:
    logo: material/movie
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/toggle-switch-off
        name: Switch to light mode
  font:
    text: Helvetica Neue, Roboto
    code: Fira Code, Roboto Mono
  features:
    - announce.dismiss
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - navigation.sections
    - navigation.path
    - navigation.tracking
    - toc.follow
    - content.tabs.link
    - search.share
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotations

markdown_extensions:
  - footnotes
  - abbr
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hantang

extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/javascripts/tablesort.js

plugins:
  - search
  - table-reader
  # - minify:
  #     minify_html: true

nav:
  - Home:
    - 电影万岁: index.md
    - 大众榜单:
      - 榜单资料: popular/index.md
      - 豆瓣电影: douban/index.md
      - IMDb电影: imdb/index.md
      - TSPDT电影: tspdt/index.md
    - 专业榜单: 
      - 榜单资料: fiff/index.md
      - 榜单资料1: fiff/index-media.md
      - 榜单资料2: fiff/index-region.md
      - 法国《电影手册》(Cahiers du cinéma): fiff/cahiers-100.md
      - 英国《视与听》(BFI, Sight & Sound): fiff/sight.md
      - 中国电影: fiff/films-zh.md
      - 香港电影: fiff/films-hk.md
      - 日本电影: fiff/films-jp.md
    - 个人片单: 
