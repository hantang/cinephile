# site information
site_name: "cinéphile: top movies / films"
site_url: https://hantang.github.io/cinephile
site_description: top movie collections
copyright: Copyright &copy; 2023 Hantang
# docs_dir: docs/

# Repository
repo_url: https://github.com/hantang/cinephile
# edit_uri: tree/main

theme:
  name: material
  # language: "zh"
  icon:
    logo: material/movie
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/toggle-switch-off
        name: Switch to light mode
  font:
    text: Helvetica Neue, Roboto
    code: Fira Code, Roboto Mono
  features:
    - announce.dismiss
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - navigation.sections
    - navigation.path
    - navigation.tracking
    - toc.follow
    - content.tabs.link
    - search.share
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotations

markdown_extensions:
  - footnotes
  - abbr
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hantang

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

plugins:
  - search
  - table-reader
  - minify:
      minify_html: true

nav:
  - Home:
      - 电影万岁: index.md
      - 豆瓣电影: douban/index.md
      - IMDb电影: imdb/index.md
      - TSPDT电影: tspdt/index.md
      - 电影组织: fiff/index.md
      - 补充: more/index.md
  - Douban:
      - 豆瓣电影: douban/index.md
      - 豆瓣电影历史榜单: douban/douban-hist.md
      - 豆瓣电影2023榜单: douban/douban-2023.md
  - IMDb:
      - IMDb电影: imdb/index.md
      - IMDb电影2023年榜单: imdb/imdb-2023.md
  - TSPDT:
      - TSPDT电影: tspdt/index.md
      - TSPDT电影2023年榜单: tspdt/tspdt-2023.md
      - TSPDT电影历年统计: tspdt/tspdt-years.md
  - FI&FF:
      - 电影组织（期刊、协会和电影节等）: fiff/index.md
      - 法国《电影手册》(Cahiers du cinéma): fiff/cahiers.md
      - 英国《视与听》(BFI, Sight & Sound): fiff/bfi.md
      - 美国标准收藏公司（The Criterion Collection）: fiff/criterion.md
      - 美国电影协会AFI: fiff/afi.md
      - 韩国釜山电影节（BIFF）: fiff/biff.md
  - More:
      - 补充: more/index.md
      - 时光网Mtime: more/mtime.md
      - 猫眼MaoYan: more/maoyan.md
      - TMDb: more/tmdb.md
      - 俄罗斯Kinopoisk: more/kinopoisk.md
      - 有生必看1001部电影: more/1001movies.md
  # - FAQ:
  # - About:
